# Docker Compose â€” AeroGuard (Compose v2, no version key needed)

services:
  redis:
    image: redis:7-alpine
    container_name: aeroguard-redis
    ports:
      - "6379:6379"
    restart: always

  inference-service:
    build: ./inference-service
    container_name: aeroguard-inference-service
    ports:
      - "8000:8000"
    volumes:
      - ./inference-service:/app
    environment:
      - YOLO_MODEL_PATH=models/yolov8n.pt
      - CONFIDENCE_THRESHOLD=0.25
      - DEVICE=cpu
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=$DATABASE_URL
      - CLOUDFLARE_R2_URL=$CLOUDFLARE_R2_URL
    depends_on:
      - redis
    restart: always

  node-api-1:
    build: ./node-api
    container_name: aeroguard-node-api-1
    environment:
      - PORT=3001
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=$DATABASE_URL
      - CLOUDFLARE_R2_URL=$CLOUDFLARE_R2_URL
      - R2_ACCOUNT_ID=$R2_ACCOUNT_ID
      - R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
      - R2_BUCKET_NAME=$R2_BUCKET_NAME
      - R2_WEBHOOK_SECRET=$R2_WEBHOOK_SECRET
      - PRESIGNED_URL_EXPIRY_SECONDS=${PRESIGNED_URL_EXPIRY_SECONDS:-900}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - redis
    restart: always

  node-api-2:
    build: ./node-api
    container_name: aeroguard-node-api-2
    environment:
      - PORT=3001
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=$DATABASE_URL
      - CLOUDFLARE_R2_URL=$CLOUDFLARE_R2_URL
      - R2_ACCOUNT_ID=$R2_ACCOUNT_ID
      - R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
      - R2_BUCKET_NAME=$R2_BUCKET_NAME
      - R2_WEBHOOK_SECRET=$R2_WEBHOOK_SECRET
      - PRESIGNED_URL_EXPIRY_SECONDS=${PRESIGNED_URL_EXPIRY_SECONDS:-900}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - redis
    restart: always

  node-api-3:
    build: ./node-api
    container_name: aeroguard-node-api-3
    environment:
      - PORT=3001
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=$DATABASE_URL
      - CLOUDFLARE_R2_URL=$CLOUDFLARE_R2_URL
      - R2_ACCOUNT_ID=$R2_ACCOUNT_ID
      - R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
      - R2_BUCKET_NAME=$R2_BUCKET_NAME
      - R2_WEBHOOK_SECRET=$R2_WEBHOOK_SECRET
      - PRESIGNED_URL_EXPIRY_SECONDS=${PRESIGNED_URL_EXPIRY_SECONDS:-900}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: aeroguard-nginx
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-api-1
      - node-api-2
      - node-api-3
    restart: always

  frontend:
    build: ./frontend
    container_name: aeroguard-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - nginx
    restart: always
