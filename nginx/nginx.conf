events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream node_api_servers {
        server node-api-1:3001;
        server node-api-2:3001;
        server node-api-3:3001;
    }

    server {
        listen 80;
        server_name localhost;

        # Disable response buffering for all proxies globally on this server (highly recommended for SSE)
        proxy_buffering off;
        proxy_cache off;

        location / {
            proxy_pass http://node_api_servers;
            proxy_http_version 1.1;
            
            # Preserve headers for Web Sockets and SSE
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Keep connections alive and prevent intermediate buffer flushing
            chunked_transfer_encoding off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }
    }
}
